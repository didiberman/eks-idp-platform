# Generates sustained HTTP load against golden-path to trigger HPA scale-out (2 → 6).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-load-generator
  namespace: load-testing
  labels:
    app: hpa-load-generator
    app.team: platform
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hpa-load-generator
  template:
    metadata:
      labels:
        app: hpa-load-generator
        app.team: platform
        environment: dev
    spec:
      containers:
        - name: load
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Targeting golden-path.golden-path.svc.cluster.local"
              while true; do
                for i in $(seq 1 50); do
                  curl -sf http://golden-path.golden-path.svc.cluster.local/ > /dev/null &
                done
                wait
              done
          resources:
            requests:
              cpu: 200m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
