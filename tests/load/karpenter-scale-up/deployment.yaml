# Scales pod count until Karpenter provisions additional nodes.
# Expect: new NodeClaims within ~30-90s depending on instance availability.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-scale-test
  namespace: load-testing
  labels:
    app: karpenter-scale-test
    app.team: platform
    environment: dev
spec:
  replicas: 40
  selector:
    matchLabels:
      app: karpenter-scale-test
  template:
    metadata:
      labels:
        app: karpenter-scale-test
        app.team: platform
        environment: dev
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 500m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
